# Generates a CycloneDX SBOM from the BUILT WAR, signs it keylessly with
# Sigstore/cosign, and attaches it to each published release.
#
# The SBOM is produced by scanning the built WAR with Syft rather than by
# reading pom.xml. The shipped WAR is assembled by Ant from the vendored
# lib/build/*.jar files, and those can differ from the pom's declared versions
# -- so a pom-derived SBOM would describe an artifact that was never shipped.
# Scanning the actual WAR makes the SBOM an accurate manifest of what ships.
# The WAR name is set by the build.xml "project" property (simis-cms.war).
name: SBOM

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # attach the SBOM + WAR to the release
      id-token: write      # keyless signing via Sigstore OIDC
      attestations: write  # record the WAR build-provenance attestation
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      # Build the same artifact that ships, so the SBOM describes exactly it
      - name: Package the web application
        run: ant -noinput -buildfile build.xml -lib lib/war package

      # Build provenance for the WAR itself (SLSA provenance): proves this
      # exact artifact came from this workflow and commit -- the same story the
      # container images already have, extended to the artifact inside them.
      # The WAR is attached to the release below so the attested subject is
      # retrievable; an attestation for an unfetchable artifact proves nothing.
      - name: Attest WAR build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/simis-cms.war

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      # Scan the built WAR (its WEB-INF/lib/*.jar) and emit CycloneDX json + xml
      - name: Generate the CycloneDX SBOM from the built WAR
        run: |
          syft target/simis-cms.war \
            -o cyclonedx-json=target/bom.json \
            -o cyclonedx-xml=target/bom.xml

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the SBOM (keyless)
        run: |
          for f in target/bom.json target/bom.xml; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem"
          done

      - name: Upload the SBOM as a build artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            target/bom.json
            target/bom.xml
            target/bom.json.sig
            target/bom.json.pem
            target/bom.xml.sig
            target/bom.xml.pem

      - name: Attach the signed SBOM to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            target/simis-cms.war \
            target/bom.json target/bom.json.sig target/bom.json.pem \
            target/bom.xml target/bom.xml.sig target/bom.xml.pem \
            --clobber
