# Dependabot version updates for SimIS CMS.
#
# Routine minor/patch bumps are grouped into a single weekly PR; majors come through
# individually so each can be evaluated on its own. The `ignore` entries below are
# deliberate holds -- each records WHY it is held and what would justify revisiting it,
# so the reasoning is not lost the next time a bump is proposed.
#
# NOTE: the shipped WAR is built by Ant from the vendored jars in lib/build/, while this
# pom.xml drives the IDE, Dependabot and the SBOM. A merged Dependabot PR therefore updates
# the pom only -- the jar must also be re-vendored for the change to reach the artifact.
# tools/check-dependency-drift.py enforces that the two stay in agreement.
version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Held deliberately: entangled with the javax-to-jakarta migration
      - dependency-name: "org.apache.johnzon:*"
        update-types: ["version-update:semver-major"]
      # Held at 3.2.x: 3.3+ throws on undefined properties (breaks WorkflowTaskTest)
      - dependency-name: "org.apache.commons:commons-jexl3"
        versions: [">=3.3.0"]
      # Held: 46.x removes com.squareup.square.models entirely (58 compile errors
      # across the Square payments integration). No CVE on the pinned version.
      # Revisit on: a CVE, Square EOL'ing the legacy SDK, or needing new features.
      - dependency-name: "com.squareup:square"
        update-types: ["version-update:semver-major"]
      # Held at 11.x. The original reason -- the javax->jakarta break at Tomcat 10 -- is
      # retired: that migration shipped in PR #216 and the app now runs Tomcat 11 /
      # jakarta.servlet / Servlet 6.1. The major stays held for a different, current reason:
      # tomcat-servlet-api is `provided` (compile-only, and deliberately NOT vendored into the
      # WAR), so its version must match the Servlet spec the *runtime* container supplies --
      # pinned by docker/app/Dockerfile `FROM tomcat:11.0-jdk21`. A major to 12.x in the pom
      # while the image is still Tomcat 11 would compile against APIs the running server lacks,
      # and check-dependency-drift.py skips provided scope, so nothing would catch the mismatch.
      # Minor/patch bumps are NOT ignored, so Tomcat 11 security fixes still flow.
      # Revisit: move the Docker base image to Tomcat 12 in the same change (and re-map the
      # server.xml / setenv.sh STIG overlay, per the Dockerfile TODOs).
      - dependency-name: "org.apache.tomcat:tomcat-servlet-api"
        update-types: ["version-update:semver-major"]
      # Held at 12.x: Flyway is the schema-migration engine and there is currently NO
      # working validation of migrations against a real database -- ContentRepositoryTest
      # reports "Tests run: 0" in CI as well as locally, and does not invoke Flyway even
      # when it runs. A major on the component that mutates production schema, covering
      # 14 Java and 33 SQL migrations, should not land untested.
      # Revisit: once a migration test applies every migration to a real PostgreSQL.
      - dependency-name: "org.flywaydb:*"
        update-types: ["version-update:semver-major"]
      # Held at 4.x: okhttp 5 publishes com.squareup.okhttp3:okhttp as a Kotlin
      # Multiplatform *metadata* artifact that contains no classes at all -- the JVM
      # classes moved to the separate okhttp-jvm artifact, which Maven does not resolve
      # from a plain dependency. Vendoring what Maven fetches would ship an empty jar
      # and make okhttp disappear from the WAR at runtime.
      # Revisit: change the dependency to com.squareup.okhttp3:okhttp-jvm.
      - dependency-name: "com.squareup.okhttp3:okhttp"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
